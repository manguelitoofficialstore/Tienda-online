<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: black;
}

header {
  background: #eeeeee;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-top: 30px;
}

.container {
  padding: 20px;
}

.productos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.producto {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.producto img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  background: #00c853;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #00e676;
}
</style>
</head>

<body>

<header>MOS Manguelito Official Store 🛒</header>

<div class="container">
