<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/fondo.jpg');
  background-size: cover;
}

header {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
  background: rgba(255,255,255,0.85);
  margin: 20px;
  border-radius: 15px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.producto {
  background: #fafafa;
  padding: 10px;
  border-radius: 12px;
  width: 150px;
  text-align: center;
  overflow: visible;
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  transition: transform 0.3s;
}

.producto:hover img {
  transform: scale(2);
}

button {
  margin-top: 5px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
  transition: all 0.3s ease;
}

button:hover {
  background: black;
  color: #FFD54F;
}

.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: black;
  color: #FFD54F;
  margin: 10% auto;
  padding: 20px;
  width: 320px;
}

input, select {
  width: 100%;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Logo_B.png" width="400">
</header>

<div class="container" id="catalogo"></div>

<div id="modalCompra" class="modal">
  <div class="modal-content">
    <span id="cerrarModal" style="cursor:pointer;">✖</span>
    <div id="formCompra"></div>
  </div>
</div>

<script>
const urlJSON = "https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/productos.json";
const numero = "573106588480";

let productosGlobal = [];

async function cargarProductos() {
  const res = await fetch(urlJSON);
  const data = await res.json();
  productosGlobal = data;

  const contenedor = document.getElementById("catalogo");

  const categorias = [...new Set(data.map(p => p["Categoría"]))];

  categorias.forEach(cat => {
    const div = document.createElement("div");
    div.innerHTML = `<h2>${cat}</h2><div class="grid"></div>`;
    const grid = div.querySelector(".grid");

    data.forEach((prod, index) => {
      if (prod["Categoría"] !== cat) return;

      let categoriaReal = prod["Categoría"];
      if (categoriaReal === "Monederos" || categoriaReal === "Tarjeteros") {
        categoriaReal = "Billeteras";
      }

      let referencia = prod["Referencia"];
      if (!referencia.includes(".")) referencia += ".png";

      const imgURL = `https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/${categoriaReal}/${referencia}`;

      const el = document.createElement("div");
      el.className = "producto";

      const btnComprar = document.createElement("button");
      btnComprar.textContent = "Comprar";

      const btnPreguntar = document.createElement("button");
      btnPreguntar.textContent = "Preguntar";

      btnComprar.addEventListener("click", () => abrirCompra(index));
      btnPreguntar.addEventListener("click", () => preguntar(prod));

      el.innerHTML = `
        <img src="${imgURL}">
        <p><b>${prod["Nombre"]}</b></p>
        <p>$${prod["Precio"]}</p>
      `;

      el.appendChild(btnComprar);
      el.appendChild(btnPreguntar);

      grid.appendChild(el);
    });

    contenedor.appendChild(div);
  });
}

/* WHATSAPP */
function preguntar(prod) {
  const msg = `Me interesa\nReferencia: ${prod["Referencia"]}\nProducto: ${prod["Nombre"]}\nPrecio: $${prod["Precio"]}`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* MODAL */
function abrirCompra(index) {
  const prod = productosGlobal[index];

  document.getElementById("modalCompra").style.display = "block";

  const form = document.getElementById("formCompra");
  form.innerHTML = "";

  const titulo = document.createElement("h3");
  titulo.textContent = prod["Nombre"];

  const nombre = document.createElement("input");
  nombre.placeholder = "Nombre completo";

  const whatsapp = document.createElement("input");
  whatsapp.placeholder = "WhatsApp";

  const cantidad = document.createElement("input");
  cantidad.type = "number";
  cantidad.value = 1;
  cantidad.min = 1;

  const total = document.createElement("p");
  total.textContent = "Total: $" + prod["Precio"];

  cantidad.addEventListener("input", () => {
    total.textContent = "Total: $" + (cantidad.value * prod["Precio"]);
  });

  const direccion = document.createElement("input");
  direccion.placeholder = "Dirección";

  const check = document.createElement("input");
  check.type = "checkbox";

  const enviar = document.createElement("button");
  enviar.textContent = "Enviar pedido";

  enviar.addEventListener("click", () => {
    if (!check.checked) {
      alert("Debes aceptar los datos");
      return;
    }

    const msg = `
🧾 Pedido

${new Date().toLocaleString()}

${nombre.value}
${whatsapp.value}

${prod["Nombre"]}
${prod["Referencia"]}

Cantidad: ${cantidad.value}
Total: $${cantidad.value * prod["Precio"]}

${direccion.value}
    `;

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
  });

  form.appendChild(titulo);
  form.appendChild(nombre);
  form.appendChild(whatsapp);
  form.appendChild(cantidad);
  form.appendChild(total);
  form.appendChild(direccion);
  form.appendChild(check);
  form.append(" Acepto datos");
  form.appendChild(enviar);
}

document.getElementById("cerrarModal").addEventListener("click", () => {
  document.getElementById("modalCompra").style.display = "none";
});

cargarProductos();
</script>

</body>
</html>
