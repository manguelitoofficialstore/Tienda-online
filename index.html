<!DOCTYPE html>

<meta charset="UTF-8">
<title>MOS Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: black;
}

header {
  background: #eeeeee;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-top: 30px;
}

.container {
  padding: 20px;
}

.productos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.producto {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 10px;
  width: 180px;
  text-align: center;
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.producto img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>
