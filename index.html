<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOS Store - Manguelito</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarillo-calido: #FFD54F;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: url('https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/fondo.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        header { background: rgba(255,255,255,0.9); padding: 15px; text-align: center; }

        .container { padding: 20px; max-width: 1100px; margin: 20px auto; background: rgba(255,255,255,0.8); border-radius: 15px; }

        .grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding-top: 50px; }

        /* EFECTO ZOOM AL DOBLE (200%) */
        .producto { 
            background: white; padding: 15px; border-radius: 12px; width: 160px; 
            text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative; overflow: visible; /* Permite que la imagen crezca hacia afuera */
        }
        
        .producto img { 
            width: 100%; height: 130px; object-fit: contain; 
            transition: transform 0.3s ease-in-out; 
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        /* Cuando el cursor está encima, escala al doble */
        .producto:hover img { 
            transform: scale(2); 
            z-index: 999; /* Se pone al frente de todo */
        }

        /* BOTONES: AMARILLO CÁLIDO -> NEGRO */
        button { 
            margin-top: 10px; background: var(--amarillo-calido); color: black; 
            border: none; padding: 10px; cursor: pointer; width: 100%; 
            border-radius: 8px; font-weight: bold; transition: 0.3s;
            position: relative; z-index: 2;
        }
        
        button:hover { 
            background: black; 
            color: var(--amarillo-calido); 
        }

        /* MODAL */
        .modal { 
            display: none; position: fixed; z-index: 10000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: #000; color: var(--amarillo-calido); 
            margin: 5% auto; padding: 25px; width: 90%; max-width: 380px; 
            border-radius: 15px; border: 1px solid var(--amarillo-calido);
            max-height: 85vh; overflow-y: auto;
        }
        input, select { 
            width: 100%; margin: 8px 0; padding: 10px; border-radius: 5px; 
            border: 1px solid var(--amarillo-calido); background: #1a1a1a; color: white;
            box-sizing: border-box;
        }
        .talla-item { border-left: 3px solid var(--amarillo-calido); padding-left: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Logo_B.png" width="300">
</header>

<div class="container" id="catalogo">
    <h3 style="text-align:center;">Cargando catálogo...</h3>
</div>

<div id="modalCompra" class="modal">
    <div class="modal-content">
        <span onclick="cerrar()" style="float:right; cursor:pointer; color:white; font-size:20px;">✕</span>
        <h3 id="mTitulo">Finalizar Pedido</h3>
        
        <input type="text" id="mNombre" placeholder="Nombre del Cliente">
        <input type="text" id="mDireccion" placeholder="Dirección de Envío">
        
        <label>Cantidad de productos:</label>
        <input type="number" id="mCant" value="1" min="1">
        
        <div id="contenedorTallas">
            </div>

        <h4 id="mTotalText">Total: $0</h4>
        <button id="btnFinal">ENVIAR A WHATSAPP</button>
    </div>
</div>

<script>
const numeroWA = "573106588480";
let productoActual = null;

async function cargar() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/productos.json");
        const data = await res.json();
        const cont = document.getElementById("catalogo");
        cont.innerHTML = "";

        data.forEach(p => {
            let carpeta = p["Categoría"];
            if (carpeta === "Monederos" || carpeta === "Tarjeteros") carpeta = "Billeteras";
            let ref = p["Referencia"];
            if (!ref.includes(".")) ref += ".png";
            const imgURL = `https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/${carpeta}/${ref}`;

            const div = document.createElement("div");
            div.className = "producto";
            div.innerHTML = `
                <img src="${imgURL}">
                <p><b>${p.Nombre}</b></p>
                <p>$${p.Precio}</p>
                <button onclick='abrirModal(${JSON.stringify(p)})'>Comprar</button>
            `;
            cont.appendChild(div);
        });
    } catch (e) {
        document.getElementById("catalogo").innerHTML = "Error al conectar con los productos.";
    }
}

function abrirModal(p) {
    productoActual = p;
    document.getElementById("mTitulo").innerText = p.Nombre;
    document.getElementById("modalCompra").style.display = "block";
    document.getElementById("mCant").value = 1;
    actualizarTallas(1);
    actualizarPrecio(1);
}

function actualizarTallas(cant) {
    const contenedor = document.getElementById("contenedorTallas");
    contenedor.innerHTML = "<p style='font-size:0.8em; margin:10px 0;'>Selecciona talla por unidad:</p>";
    
    for (let i = 1; i <= cant; i++) {
        const div = document.createElement("div");
        div.className = "talla-item";
        div.innerHTML = `
            <label style="font-size:0.7em">Unidad #${i}:</label>
            <select class="sel-talla">
                <option value="S">Talla S</option>
                <option value="M">Talla M</option>
                <option value="L">Talla L</option>
                <option value="XL">Talla XL</option>
                <option value="Única">Talla Única</option>
            </select>
        `;
        contenedor.appendChild(div);
    }
}

function actualizarPrecio(c) {
    document.getElementById("mTotalText").innerText = "Total: $" + (c * productoActual.Precio);
}

document.getElementById("mCant").addEventListener("input", (e) => {
    let c = parseInt(e.target.value);
    if(isNaN(c) || c < 1) c = 1;
    actualizarTallas(c);
    actualizarPrecio(c);
});

document.getElementById("btnFinal").onclick = function() {
    const nom = document.getElementById("mNombre").value;
    const dir = document.getElementById("mDireccion").value;
    const cant = document.getElementById("mCant").value;
    
    const combos = document.querySelectorAll(".sel-talla");
    let listaTallas = [];
    combos.forEach((s, i) => {
        listaTallas.push(`Unidad ${i+1}: ${s.value}`);
    });

    if(!nom || !dir) {
        alert("Por favor completa los datos de envío.");
        return;
    }

    const textoWA = `🧾 *NUEVO PEDIDO MANGUELITO*\n\n` +
                  `*Producto:* ${productoActual.Nombre}\n` +
                  `*Ref:* ${productoActual.Referencia}\n` +
                  `*Cantidad:* ${cant}\n` +
                  `*Tallas:* \n- ${listaTallas.join('\n- ')}\n\n` +
                  `*Total:* $${cant * productoActual.Precio}\n\n` +
                  `*Cliente:* ${nom}\n` +
                  `*Dirección:* ${dir}`;
    
    window.open(`https://wa.me/${numeroWA}?text=${encodeURIComponent(textoWA)}`, '_blank');
};

function cerrar() { document.getElementById("modalCompra").style.display = "none"; }
window.onclick = (e) => { if (e.target == document.getElementById("modalCompra")) cerrar(); };

cargar();
</script>
</body>
</html>
