<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: black;
}

header {
  background: #eeeeee;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

.container {
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

/* TARJETAS */
.producto {
  background: #f5f5f5;
  padding: 10px;
  border-radius: 10px;
  width: 140px;
  text-align: center;
  transition: 0.3s;
}

.producto:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* IMÁGENES PEQUEÑAS SIN RECORTE */
.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  background: white;
}

/* BOTONES */
button {
  margin-top: 8px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 8px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>MOS Manguelito Official Store 🛒</header>

<div class="container" id="catalogo"></div>

<script>
const usuario = "manguelitoofficialstore";
const repo = "Tienda-online";
const rama = "main";

/* AGREGA AQUÍ TODAS TUS CARPETAS */
const carpetas = ["Camisetas","Billeteras","Llaveros","Pulseras","Relojes"];

const contenedor = document.getElementById("catalogo");

async function cargarImagenes() {
  for (let carpeta of carpetas) {
    try {
      const url = `https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}`;
      const res = await fetch(url);
      const data = await res.json();

      data.forEach(file => {
        if (file.type === "file") {

          const div = document.createElement("div");
          div.className = "producto";

          div.innerHTML = `
            <img src="${file.download_url}">
            <p>${file.name}</p>
            <button onclick="comprar('${file.name}')">Comprar</button>
          `;

          contenedor.appendChild(div);
        }
      });

    } catch (error) {
      console.log("Error en carpeta:", carpeta);
    }
  }
}

/* WHATSAPP */
function comprar(producto) {
  const numero = "573001234567"; // 👈 CAMBIA ESTO
  const mensaje = "Hola, quiero comprar: " + producto;
  const url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}

cargarImagenes();
</script>

</body>
</html>
