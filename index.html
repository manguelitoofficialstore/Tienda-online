<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<!-- TIPOGRAFÍA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #111;
}

/* HEADER */
header {
  background: white;
  padding: 15px;
  text-align: center;
  border-bottom: 2px solid #eee;
}

.logo {
  width: 120px;
}

/* CONTENEDOR */
.container {
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

/* TARJETAS */
.producto {
  background: #fafafa;
  padding: 10px;
  border-radius: 12px;
  width: 140px;
  text-align: center;
  border: 1px solid #eee;
  transition: 0.3s;
}

.producto:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* IMÁGENES */
.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  background: white;
  transition: transform 0.3s ease;
}

/* 🔥 ZOOM FUERTE */
.producto:hover img {
  transform: scale(2);
  z-index: 999;
}

/* TEXTO */
.producto p {
  font-size: 12px;
  margin: 8px 0;
}

/* BOTÓN */
button {
  margin-top: 5px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 7px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: 600;
  font-size: 12px;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
  <img 
    class="logo" 
    src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/LOGO_MOS.png"
    onerror="this.style.display='none'"
  >
</header>

<div class="container" id="catalogo"></div>

<script>
const usuario = "manguelitoofficialstore";
const repo = "Tienda-online";

/* TODAS LAS CARPETAS */
const carpetas = ["Camisetas","Billeteras","Llaveros","Pulseras","Relojes"];

const contenedor = document.getElementById("catalogo");

async function cargarImagenes() {
  for (let carpeta of carpetas) {
    try {
      const url = `https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}`;
      const res = await fetch(url);
      const data = await res.json();

      data.forEach(file => {
        if (file.type === "file") {

          const div = document.createElement("div");
          div.className = "producto";

          div.innerHTML = `
            <img src="${file.download_url}">
            <p>${file.name}</p>
            <button onclick="comprar('${file.name}')">Comprar</button>
          `;

          contenedor.appendChild(div);
        }
      });

    } catch (error) {
      console.log("Error en carpeta:", carpeta);
    }
  }
}

/* WHATSAPP */
function comprar(producto) {
  const numero = "573001234567"; // 👈 CAMBIA ESTO
  const mensaje = "Hola, quiero comprar: " + producto;
  const url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}

cargarImagenes();
</script>

</body>
</html>
