<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: black;
}

header {
  background: #eeeeee;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-top: 30px;
}

.container {
  padding: 20px;
}

.productos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* TARJETA PRODUCTO */
.producto {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 10px;
  width: 180px;
  text-align: center;
  transition: 0.3s;
}

/* HOVER PRODUCTO */
.producto:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* IMÁGENES */
.producto img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}

/* BOTONES */
button {
  margin-top: 10px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>MOS Manguelito Official Store 🛒</header>

<div class="container">

<!-- CAMISETAS -->
<h2>Camisetas</h2>
<div class="productos">

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Camisetas/CA-BO-B.png">
<p>CA-BO-B</p>
<button onclick="comprar('CA-BO-B')">Comprar</button>
</div>

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Camisetas/CA-BO-C.png">
<p>CA-BO-C</p>
<button onclick="comprar('CA-BO-C')">Comprar</button>
</div>

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Camisetas/CA-BO-N.png">
<p>CA-BO-N</p>
<button onclick="comprar('CA-BO-N')">Comprar</button>
</div>

</div>

<!-- BILLETERAS -->
<h2>Billeteras</h2>
<div class="productos">

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Billeteras/AC-BI-CO-A.png">
<p>AC-BI-CO-A</p>
<button onclick="comprar('AC-BI-CO-A')">Comprar</button>
</div>

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Billeteras/AC-BI-FR-CC1.png">
<p>AC-BI-FR-CC1</p>
<button onclick="comprar('AC-BI-FR-CC1')">Comprar</button>
</div>

</div>

<!-- LLAVEROS -->
<h2>Llaveros</h2>
<div class="productos">

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Llaveros/IT-LL-C1.png">
<p>IT-LL-C1</p>
<button onclick="comprar('IT-LL-C1')">Comprar</button>
</div>

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Llaveros/IT-LL-M1.png">

<button onclick="comprar('IT-LL-M1')">Comprar</button>
</div>

<!-- PULSERAS -->
<h2>Pulseras</h2>
<div class="productos">

<div class="producto">
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Pulseras/AC-PU-ME-A.png">
<p>AC-PU-ME-A</p>
<button onclick="comprar('AC-PU-ME-A')">Comprar</button>

<p>AC-PU-ME-B</p>
<button onclick="comprar('AC-PU-ME-B')">Comprar</button>
</div>

</div>

</div>

<script>
function comprar(producto) {
  var numero = "573001234567"; // 👈 CAMBIA POR TU NÚMERO
  var mensaje = "Hola, quiero comprar: " + producto;
  var url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}
</script>

</body>
</html>
