<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

header {
  background: black;
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-top: 30px;
}

.container {
  padding: 20px;
}

.productos {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.producto {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

.producto img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  background: #00c853;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: #00e676;
}
</style>
</head>

<body>

<header>MOS Manguelito Official Store 🛒</header>

<div class="container">

<!-- CAMISETAS -->
<h2>Camisetas</h2>
<div class="productos">

<div class="producto">
<img src="Camisetas/CA-BO-B.png">
<p>CA-BO-B</p>
<button onclick="comprar('CA-BO-B')">Comprar</button>
</div>

<div class="producto">
<img src="Camisetas/CA-BO-C.png">
<p>CA-BO-C</p>
<button onclick="comprar('CA-BO-C')">Comprar</button>
</div>

<div class="producto">
<img src="Camisetas/CA-BO-N.png">
<p>CA-BO-N</p>
<button onclick="comprar('CA-BO-N')">Comprar</button>
</div>

</div>

<!-- BILLETERAS -->
<h2>Billeteras</h2>
<div class="productos">

<div class="producto">
<img src="Billeteras/AC-BI-CO-A.png">
<p>Billetera A</p>
<button onclick="comprar('Billetera A')">Comprar</button>
</div>

<div class="producto">
<img src="Billeteras/AC-BI-FR-CC1.png">
<p>Billetera CC1</p>
<button onclick="comprar('Billetera CC1')">Comprar</button>
</div>

</div>

<!-- LLAVEROS -->
<h2>Llaveros</h2>
<div class="productos">

<div class="producto">
<img src="Llaveros/IT-LL-C1.png">
<p>Llavero C1</p>
<button onclick="comprar('Llavero C1')">Comprar</button>
</div>

<div class="producto">
<img src="Llaveros/IT-LL-M1.png">
<p>Llavero M1</p>
<button onclick="comprar('Llavero M1')">Comprar</button>
</div>

</div>

<!-- PULSERAS -->
<h2>Pulseras</h2>
<div class="productos">

<div class="producto">
<img src="Pulseras/AC-PU-ME-A.png">
<p>Pulsera A</p>
<button onclick="comprar('Pulsera A')">Comprar</button>
</div>

<div class="producto">
<img src="Pulseras/AC-PU-ME-B.png">
<p>Pulsera B</p>
<button onclick="comprar('Pulsera B')">Comprar</button>
</div>

</div>

</div>

<script>
function comprar(producto) {
  alert("Elegiste: " + producto);
}
</script>

</body>
</html>
