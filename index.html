<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/fondo.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  background: rgba(255,255,255,0.85);
  margin: 20px;
  border-radius: 15px;
}

/* BOTONES DE FILTRO */
.filtros {
  text-align: center;
  margin: 10px;
}

.filtros button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  cursor: pointer;
}

.filtros button:hover {
  background: #FFD54F;
  color: black;
}

/* PRODUCTOS */
.producto {
  background: #fafafa;
  padding: 10px;
  border-radius: 12px;
  width: 140px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  transition: transform 0.3s;
}

.producto:hover img {
  transform: scale(2);
}

button {
  margin-top: 5px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  color: black;
  border: none;
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  font-size: 12px;
  width: 100%;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: black;
  color: #FFD54F;
  margin: 10% auto;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  text-align: center;
}

.cerrar {
  color: white;
  float: right;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/LOGO_MOS.png" style="width:200px;">
</header>


<div class="container" id="catalogo"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="cerrar" onclick="cerrarModal()">✖</span>
    <h3 id="modalTitulo"></h3>
    <img id="modalImg" style="width:100%; margin:10px 0;">
    <p>Producto disponible en MOS Store</p>
  </div>
</div>

<script>
const usuario = "manguelitoofficialstore";
const repo = "Tienda-online";

const carpetas = [
  "Camisetas",
  "Pulseras",
  "Billeteras",
  "Llaveros",
  "Relojes",
  "Tulas",
  "Gorras"
];

const contenedor = document.getElementById("catalogo");
const filtrosDiv = document.getElementById("filtros");

let productos = [];

/* CREAR BOTONES */
function crearFiltros() {
  filtrosDiv.innerHTML = '<button onclick="filtrar(\'Todos\')">Todos</button>';

  carpetas.forEach(cat => {
    filtrosDiv.innerHTML += `<button onclick="filtrar('${cat}')">${cat}</button>`;
  });
}

/* FILTRAR */
function filtrar(categoria) {
  contenedor.innerHTML = "";

  productos
    .filter(p => categoria === "Todos" || p.categoria === categoria)
    .forEach(p => {
      contenedor.appendChild(p.elemento);
    });
}

/* CARGAR PRODUCTOS */
async function cargarImagenes() {
  for (let carpeta of carpetas) {
    try {
      const url = `https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}?t=${new Date().getTime()}`;
      const res = await fetch(url);
      const data = await res.json();

      data.forEach(file => {
        if (file.download_url) {

          const div = document.createElement("div");
          div.className = "producto";

          div.innerHTML = `
            <img src="${file.download_url}">
            <p>${file.name}</p>
            <button onclick="comprar('${file.name}')">Comprar</button>
            <button onclick="verDetalles('${file.name}','${file.download_url}')">Detalles</button>
          `;

          productos.push({
            categoria: carpeta,
            elemento: div
          });

          contenedor.appendChild(div);
        }
      });

    } catch (error) {}
  }
}

/* WHATSAPP */
function comprar(producto) {
  const numero = "573001234567";
  const mensaje = "Hola, quiero comprar: " + producto;
  window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
}

/* MODAL */
function verDetalles(nombre, img) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitulo").innerText = nombre;
  document.getElementById("modalImg").src = img;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

/* INICIO */
crearFiltros();
cargarImagenes();
</script>

</body>
</html>
