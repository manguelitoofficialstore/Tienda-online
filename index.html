<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/fondo.jpg');
  background-size: cover;
}

header {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
  background: rgba(255,255,255,0.85);
  margin: 20px;
  border-radius: 15px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.producto {
  background: #fafafa;
  padding: 10px;
  border-radius: 12px;
  width: 150px;
  text-align: center;
  overflow: visible;
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  transition: transform 0.3s;
}

.producto:hover img {
  transform: scale(2);
  z-index: 10;
}

button {
  margin-top: 5px;
  padding: 6px;
  width: 100%;
  cursor: pointer;
}

.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: black;
  color: #FFD54F;
  margin: 10% auto;
  padding: 20px;
  width: 320px;
}

input, select {
  width: 100%;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Logo_B.png" width="400">
</header>

<div class="container" id="catalogo"></div>

<div id="modalCompra" class="modal">
  <div class="modal-content">
    <span onclick="cerrarModal()">✖</span>
    <div id="formCompra"></div>
  </div>
</div>

<script>
const urlJSON = "https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/productos.json";
const numero = "573106588480";
const scriptURL = "TU_URL_GOOGLE_SCRIPT"; // 🔥 pega aquí tu URL

async function cargarProductos() {
  const res = await fetch(urlJSON);
  const data = await res.json();
  const contenedor = document.getElementById("catalogo");

  const categorias = [...new Set(data.map(p => p["Categoría"]))];

  categorias.forEach(cat => {
    const div = document.createElement("div");
    div.innerHTML = `<h2>${cat}</h2><div class="grid"></div>`;
    const grid = div.querySelector(".grid");

    data.filter(p => p["Categoría"] === cat).forEach(prod => {

      let categoriaReal = prod["Categoría"];
      if (categoriaReal === "Monederos" || categoriaReal === "Tarjeteros") {
        categoriaReal = "Billeteras";
      }

      let referencia = prod["Referencia"];
      if (!referencia.includes(".")) referencia += ".png";

      const imgURL = `https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/${categoriaReal}/${referencia}`;

      const el = document.createElement("div");
      el.className = "producto";

      el.innerHTML = `
        <img src="${imgURL}">
        <p><b>${prod["Nombre"]}</b></p>
        <p>$${prod["Precio"]}</p>

        <button onclick="abrirCompra(this)" data-prod='${JSON.stringify(prod)}'>Comprar</button>

        <button onclick="preguntar('${prod["Referencia"]}','${prod["Nombre"]}','${prod["Precio"]}')">
          Preguntar
        </button>
      `;

      grid.appendChild(el);
    });

    contenedor.appendChild(div);
  });
}

/* WHATSAPP */
function preguntar(ref, nombre, precio) {
  const msg = `Me interesa\nReferencia: ${ref}\nProducto: ${nombre}\nPrecio: $${precio}`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* MODAL */
function abrirCompra(btn) {
  const prod = JSON.parse(btn.dataset.prod);

  document.getElementById("modalCompra").style.display = "block";

  document.getElementById("formCompra").innerHTML = `
    <h3>${prod["Nombre"]}</h3>

    <input id="nombre" placeholder="Nombre completo">
    <input id="whatsapp" placeholder="WhatsApp">

    <input id="cantidad" type="number" value="1" min="1" onchange="actualizarTotal(${prod["Precio"]}, '${prod["Talla"]}')">

    <p id="total">Total: $${prod["Precio"]}</p>

    <div id="tallasContainer"></div>

    <select id="tipoDireccion" onchange="cambiarDireccion()">
      <option value="">Tipo dirección</option>
      <option value="urbana">Urbana</option>
      <option value="rural">Rural</option>
    </select>

    <div id="direccionExtra"></div>

    <label><input type="checkbox" id="datos"> Acepto datos</label>

    <button onclick='enviarPedido(${JSON.stringify(prod)})'>Enviar pedido</button>

    <button onclick="pagar()">Pagar con Nequi</button>
  `;

  actualizarTotal(prod["Precio"], prod["Talla"]);
}

/* TOTAL */
function actualizarTotal(precio, usaTalla) {
  const cantidad = parseInt(document.getElementById("cantidad").value) || 1;
  document.getElementById("total").innerText = "Total: $" + (precio * cantidad);

  if (usaTalla === "Sí") {
    let html = "";
    ["XS","S","M","L","XL","XXL"].forEach(t => {
      html += `${t}: <input type="number" id="talla_${t}" min="0" value="0"><br>`;
    });
    document.getElementById("tallasContainer").innerHTML = html;
  }
}

/* DIRECCIÓN */
function cambiarDireccion() {
  const tipo = document.getElementById("tipoDireccion").value;
  const div = document.getElementById("direccionExtra");

  if (tipo === "urbana") {
    div.innerHTML = `<input id="direccion" placeholder="Dirección">`;
  } else {
    div.innerHTML = `<input id="direccion" placeholder="Municipio / Vereda / Referencia">`;
  }
}

/* PEDIDO */
function enviarPedido(prod) {

  if (!document.getElementById("datos").checked) {
    alert("Debes aceptar datos");
    return;
  }

  const nombre = document.getElementById("nombre").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const cantidad = parseInt(document.getElementById("cantidad").value);
  const total = cantidad * prod["Precio"];
  const fecha = new Date().toLocaleString();
  const orden = Date.now();
  const direccion = document.getElementById("direccion")?.value || "";

  // 🔥 GUARDAR EN SHEETS
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      fecha,nombre,whatsapp,
      producto: prod["Nombre"],
      referencia: prod["Referencia"],
      cantidad,total,direccion
    })
  });

  // 🔥 WHATSAPP
  const msg = `
🧾 Orden #${orden}

${fecha}

${nombre}
${whatsapp}

${prod["Nombre"]}
Ref: ${prod["Referencia"]}

Cantidad: ${cantidad}
Total: $${total}

Dirección: ${direccion}
  `;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* PAGO */
function pagar() {
  window.open("TU_LINK_QR_AQUI");
}

function cerrarModal() {
  document.getElementById("modalCompra").style.display = "none";
}

cargarProductos();
</script>

</body>
</html>
