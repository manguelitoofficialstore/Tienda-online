<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MOS Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/fondo.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

header {
  background: rgba(255,255,255,0.9);
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
  background: rgba(255,255,255,0.85);
  margin: 20px;
  border-radius: 15px;
}

.categoria { margin-bottom: 30px; }

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.producto {
  background: #fafafa;
  padding: 10px;
  border-radius: 12px;
  width: 150px;
  text-align: center;
}

.producto img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

button {
  margin-top: 5px;
  background: linear-gradient(135deg, #FFD54F, #FFB300);
  border: none;
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
  width: 100%;
}

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: black;
  color: #FFD54F;
  margin: 10% auto;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 5px;
}
</style>
</head>

<body>

<header>
  <img src="https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/Logo_B.png" width="400">
</header>

<div class="container" id="catalogo"></div>

<!-- MODAL COMPRA -->
<div id="modalCompra" class="modal">
  <div class="modal-content">
    <span onclick="cerrarModal()" style="cursor:pointer;">✖</span>
    <div id="formCompra"></div>
  </div>
</div>

<script>
const urlJSON = "https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/productos.json";
const numero = "573106588480";

async function cargarProductos() {
  const res = await fetch(urlJSON);
  const data = await res.json();

  const contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  const categorias = [...new Set(data.map(p => p["Categoría"]))];

  categorias.forEach(cat => {
    const div = document.createElement("div");
    div.className = "categoria";

    div.innerHTML = `<h2>${cat}</h2><div class="grid"></div>`;
    const grid = div.querySelector(".grid");

    data.filter(p => p["Categoría"] === cat).forEach(prod => {

      const imgURL = `https://raw.githubusercontent.com/manguelitoofficialstore/Tienda-online/main/${prod["Categoría"]}/${prod["Referencia"]}`;

      const el = document.createElement("div");
      el.className = "producto";

      el.innerHTML = `
        <img src="${imgURL}">
        <p><b>${prod["Nombre"]}</b></p>
        <p>$${prod["Precio"]}</p>

        <button onclick='abrirCompra(${JSON.stringify(prod)})'>Comprar</button>

        <button onclick="preguntar('${prod["Referencia"]}','${prod["Nombre"]}','${prod["Precio"]}')">
          Preguntar
        </button>
      `;

      grid.appendChild(el);
    });

    contenedor.appendChild(div);
  });
}

/* WHATSAPP */
function preguntar(ref, nombre, precio) {
  const msg = `Me interesa\nReferencia: ${ref}\nProducto: ${nombre}\nPrecio: $${precio}`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* MODAL COMPRA */
function abrirCompra(prod) {
  document.getElementById("modalCompra").style.display = "block";

  document.getElementById("formCompra").innerHTML = `
    <h3>${prod["Nombre"]}</h3>

    <input id="nombre" placeholder="Nombre completo">
    <input id="whatsapp" placeholder="WhatsApp">

    ${prod["Talla"] === "Sí" ? `
      <select id="talla">
        <option>Talla</option>
        <option>XS</option><option>S</option><option>M</option>
        <option>L</option><option>XL</option><option>XXL</option>
      </select>` : ""}

    <select id="tipoDireccion" onchange="cambiarDireccion()">
      <option value="">Tipo dirección</option>
      <option value="urbana">Urbana</option>
      <option value="rural">Rural</option>
    </select>

    <div id="direccionExtra"></div>

    <button onclick='enviarPedido(${JSON.stringify(prod)})'>Enviar pedido</button>
  `;
}

function cambiarDireccion() {
  const tipo = document.getElementById("tipoDireccion").value;
  const div = document.getElementById("direccionExtra");

  if (tipo === "urbana") {
    div.innerHTML = `<input id="direccion" placeholder="Dirección completa">`;
  } else {
    div.innerHTML = `
      <select id="vereda">
        <option>Vereda</option>
        <option>Caño del padre</option>
        <option>Rusia</option>
        <option>Calderón</option>
        <option>Las Marías</option>
      </select>

      <select id="sector">
        <option>Sector</option>
        <option>Las cruces</option>
        <option>Centro</option>
        <option>San José</option>
        <option>La Corriente</option>
        <option>Cartagenita</option>
        <option>El Canal 1</option>
        <option>El Canal 2</option>
        <option>El Laberinto</option>
        <option>Galilea</option>
        <option>Pisa Bonito</option>
        <option>Incora</option>
      </select>

      <input id="ref" placeholder="Punto de referencia">
    `;
  }
}

function enviarPedido(prod) {
  const nombre = document.getElementById("nombre").value;
  const whatsapp = document.getElementById("whatsapp").value;
  const talla = document.getElementById("talla")?.value || "";

  const msg = `
Pedido:
Nombre: ${nombre}
WhatsApp: ${whatsapp}
Producto: ${prod["Nombre"]}
Referencia: ${prod["Referencia"]}
Precio: $${prod["Precio"]}
Talla: ${talla}
  `;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

function cerrarModal() {
  document.getElementById("modalCompra").style.display = "none";
}

cargarProductos();
</script>

</body>
</html>
